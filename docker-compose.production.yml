services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app

  backend:
    init: true
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DEBUG: "false"

      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:?ACCESS_TOKEN_EXPIRE_MINUTES is required}

      PLATFORM_ADMIN_ENABLED: ${PLATFORM_ADMIN_ENABLED:-false}
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET:-}
      PLATFORM_ACCESS_TOKEN_EXPIRE_MINUTES: ${PLATFORM_ACCESS_TOKEN_EXPIRE_MINUTES:-240}

      PUBLIC_SIGNUP_THROTTLE_SECRET: ${PUBLIC_SIGNUP_THROTTLE_SECRET:?PUBLIC_SIGNUP_THROTTLE_SECRET is required}
      PUBLIC_SIGNUP_THROTTLE_WINDOW_MINUTES: ${PUBLIC_SIGNUP_THROTTLE_WINDOW_MINUTES:-60}
      PUBLIC_SIGNUP_THROTTLE_LIMIT: ${PUBLIC_SIGNUP_THROTTLE_LIMIT:-3}

      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:?BACKEND_CORS_ORIGINS is required}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?FRONTEND_BASE_URL is required}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?TRUSTED_HOSTS is required}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}

      LOCAL_STORAGE_DIR: /app/storage
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required}

      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_BASE_URL: ${TELEGRAM_WEBHOOK_BASE_URL:-}
      TELEGRAM_HTTP_TIMEOUT_SECONDS: ${TELEGRAM_HTTP_TIMEOUT_SECONDS:-20}
      TELEGRAM_HTTP_MAX_ATTEMPTS: ${TELEGRAM_HTTP_MAX_ATTEMPTS:-1}
    volumes:
      - leafletpilot_storage:/app/storage
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/db', timeout=3).read()"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    stop_grace_period: 30s
    networks:
      - app

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:?VITE_API_BASE_URL is required}
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - backend
    networks:
      - app

  migration:
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles:
      - migration
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      ENVIRONMENT: production
      DEBUG: "false"

      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:?POSTGRES_USER is required}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}@postgres:5432/${POSTGRES_DB:?POSTGRES_DB is required}

      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:?ACCESS_TOKEN_EXPIRE_MINUTES is required}

      PLATFORM_ADMIN_ENABLED: ${PLATFORM_ADMIN_ENABLED:-false}
      PLATFORM_JWT_SECRET: ${PLATFORM_JWT_SECRET:-}
      PLATFORM_ACCESS_TOKEN_EXPIRE_MINUTES: ${PLATFORM_ACCESS_TOKEN_EXPIRE_MINUTES:-240}

      PUBLIC_SIGNUP_THROTTLE_SECRET: ${PUBLIC_SIGNUP_THROTTLE_SECRET:?PUBLIC_SIGNUP_THROTTLE_SECRET is required}
      PUBLIC_SIGNUP_THROTTLE_WINDOW_MINUTES: ${PUBLIC_SIGNUP_THROTTLE_WINDOW_MINUTES:-60}
      PUBLIC_SIGNUP_THROTTLE_LIMIT: ${PUBLIC_SIGNUP_THROTTLE_LIMIT:-3}

      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:?BACKEND_CORS_ORIGINS is required}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:?FRONTEND_BASE_URL is required}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:?TRUSTED_HOSTS is required}
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}

      LOCAL_STORAGE_DIR: /app/storage
      LOG_LEVEL: ${LOG_LEVEL:?LOG_LEVEL is required}

      TELEGRAM_BOT_ENABLED: ${TELEGRAM_BOT_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-}
      TELEGRAM_WEBHOOK_BASE_URL: ${TELEGRAM_WEBHOOK_BASE_URL:-}
      TELEGRAM_HTTP_TIMEOUT_SECONDS: ${TELEGRAM_HTTP_TIMEOUT_SECONDS:-20}
      TELEGRAM_HTTP_MAX_ATTEMPTS: ${TELEGRAM_HTTP_MAX_ATTEMPTS:-1}
    command: ["python", "-m", "alembic", "upgrade", "head"]
    networks:
      - app

volumes:
  postgres_data:
  leafletpilot_storage:

networks:
  app:
    internal: true

