name: Validation

on:
  pull_request:
  push:
    branches:
      - main
      - dev

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: leafletpilot_test
          POSTGRES_USER: leafletpilot
          POSTGRES_PASSWORD: leafletpilot
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U leafletpilot -d leafletpilot_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      TEST_DATABASE_URL: postgresql+asyncpg://leafletpilot:leafletpilot@localhost:5432/leafletpilot_test
      DATABASE_URL: postgresql+asyncpg://leafletpilot:leafletpilot@localhost:5432/leafletpilot_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml
      - name: Install backend
        working-directory: backend
        run: |
          python -m pip install -U pip
          python -m pip install -e .[dev]
      - name: Run backend tests
        working-directory: backend
        run: python -m pytest -q
      - name: Check Alembic heads
        working-directory: backend
        run: |
          heads="$(python -m alembic heads | wc -l)"
          test "$heads" -eq 1
          python -m alembic heads

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm run validate
      - run: npm run build
      - run: npm run smoke

  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate production Compose
        env:
          POSTGRES_DB: leafletpilot
          POSTGRES_USER: leafletpilot
          POSTGRES_PASSWORD: not-a-real-password
          JWT_SECRET_KEY: ci-only-not-a-production-secret-value-1234567890
          ACCESS_TOKEN_EXPIRE_MINUTES: "60"
          BACKEND_CORS_ORIGINS: '["https://app.example.com"]'
          FRONTEND_BASE_URL: https://app.example.com
          TRUSTED_HOSTS: '["api.example.com"]'
          LOG_LEVEL: INFO
          VITE_API_BASE_URL: https://api.example.com/api
        run: docker compose -f docker-compose.production.yml config
      - name: Build backend image
        run: docker build -f backend/Dockerfile backend
      - name: Build frontend image
        run: docker build -f Dockerfile.frontend --build-arg VITE_API_BASE_URL=https://api.example.com/api .
